<svg viewBox="4 4 480 76" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Neutral sample diagram: input flows to a model, which produces an output.">
  <title>Sample diagram</title>
  <defs>
    <style>
      .n  { fill: #f3f4f5; stroke: #bbcabf; stroke-width: 1; }
      .na { fill: #f3f4f5; stroke: #006e37; stroke-width: 1.5; }
      .nt { fill: #f3f4f5; stroke: #bbcabf; stroke-width: 1; }
      .lbl { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 500; fill: #2d2d2d; }
      .sub { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; fill: #6c7a71; }
      .conn { fill: none; stroke: #6c7a71; stroke-width: 1.5; }
      .af  { fill: #6c7a71; }
      @media (prefers-color-scheme: dark) {
        .n  { fill: #1c1b1b; stroke: #3c4a42; }
        .na { fill: #1c1b1b; stroke: #2aa566; }
        .nt { fill: #1c1b1b; stroke: #3c4a42; }
        .lbl { fill: #e2e2e2; }
        .sub { fill: #bbcabf; }
        .conn { stroke: #86948a; }
        .af  { fill: #86948a; }
      }
    </style>
    <marker id="arr" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <path class="af" d="M0,0 L7,3 L0,6 Z"/>
    </marker>
  </defs>

  <rect class="n" x="20" y="20" width="120" height="44" rx="4"/>
  <text class="lbl" x="80" y="47" text-anchor="middle">input</text>

  <line class="conn" x1="140" y1="42" x2="184" y2="42" marker-end="url(#arr)"/>

  <rect class="na" x="184" y="20" width="120" height="44" rx="4"/>
  <text class="lbl" x="244" y="47" text-anchor="middle">model</text>

  <line class="conn" x1="304" y1="42" x2="348" y2="42" marker-end="url(#arr)"/>

  <rect class="n" x="348" y="20" width="120" height="44" rx="4"/>
  <text class="lbl" x="408" y="47" text-anchor="middle">output</text>
</svg>
