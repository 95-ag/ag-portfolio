<svg viewBox="0 0 800 216" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OOD dataset construction pipeline: web-scraped images and ImageNet-sampled subsets are joined, filtered with label verification, resized to 32 by 32 pixels, and output as a query-ready OOD dataset.">
  <title>OOD dataset construction pipeline</title>
  <defs>
    <style>
      .n  { fill: #f3f4f5; stroke: #bbcabf; stroke-width: 1; }
      .na { fill: #f3f4f5; stroke: #006c49; stroke-width: 1.5; }
      .nt { fill: #f3f4f5; stroke: #bbcabf; stroke-width: 1; }
      .lbl { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 500; fill: #191c1d; }
      .sub { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 10px; fill: #6c7a71; }
      .conn { fill: none; stroke: #6c7a71; stroke-width: 1.5; }
      .af  { fill: #6c7a71; }
      @media (prefers-color-scheme: dark) {
        .n  { fill: #1c1b1b; stroke: #3c4a42; }
        .na { fill: #1c1b1b; stroke: #4edea3; }
        .nt { fill: #1c1b1b; stroke: #3c4a42; }
        .lbl { fill: #e5e2e1; }
        .sub { fill: #bbcabf; }
        .conn { stroke: #86948a; }
        .af  { fill: #86948a; }
      }
    </style>
    <marker id="arr" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <path class="af" d="M0,0 L7,3 L0,6 Z"/>
    </marker>
  </defs>

  <!-- ── TWO INPUTS ──────────────────────────────────────────────
       N1: x=20, y=36,  w=130, h=44, cx=85,  cy=58  (right=150)
       N2: x=20, y=136, w=130, h=44, cx=85,  cy=158 (right=150)
       Elbow x=184 (midpoint between input right=150 and N3 left=212)
       N3: x=212, y=74, w=150, h=64, cx=287, cy=106
       N4: x=406, y=84, w=140, h=44, cx=476, cy=106 (right=546)
       N5: x=590, y=84, w=140, h=44, cx=660, cy=106 [accent] (right=730)
  ───────────────────────────────────────────────────────────────── -->

  <!-- N1: Web Scraping -->
  <rect class="n" x="20" y="36" width="130" height="44" rx="4"/>
  <text class="lbl" x="85" y="53" text-anchor="middle">Web Scraping</text>
  <text class="sub" x="85" y="67" text-anchor="middle">domain-matched images</text>

  <!-- N2: ImageNet Sampling -->
  <rect class="n" x="20" y="136" width="130" height="44" rx="4"/>
  <text class="lbl" x="85" y="153" text-anchor="middle">ImageNet Sampling</text>
  <text class="sub" x="85" y="167" text-anchor="middle">class-mapped subsets</text>

  <!-- Elbow paths: both inputs converge to N3 left side.
       N1 right-center (150, 58) → elbow x=184 → N3 upper entry (212, 94)
       N2 right-center (150, 158) → elbow x=184 → N3 lower entry (212, 118) -->
  <path class="conn" d="M 150 58 L 184 58 L 184 94 L 212 94" marker-end="url(#arr)"/>
  <path class="conn" d="M 150 158 L 184 158 L 184 118 L 212 118" marker-end="url(#arr)"/>

  <!-- N3: Label Verification (taller — receives two inputs) -->
  <rect class="nt" x="212" y="74" width="150" height="64" rx="4"/>
  <text class="lbl" x="287" y="103" text-anchor="middle">Label Verification</text>
  <text class="sub" x="287" y="117" text-anchor="middle">filter · deduplicate</text>

  <!-- A3: N3 right-center → N4 left -->
  <!-- N3 right=362, cy=106. N4 left=406. -->
  <line class="conn" x1="362" y1="106" x2="406" y2="106" marker-end="url(#arr)"/>

  <!-- N4: 32×32 Resize -->
  <rect class="n" x="406" y="84" width="140" height="44" rx="4"/>
  <text class="lbl" x="476" y="101" text-anchor="middle">32×32 Resize</text>
  <text class="sub" x="476" y="115" text-anchor="middle">CIFAR input format</text>

  <!-- A4: N4 right-center → N5 left -->
  <!-- N4 right=546. N5 left=590. -->
  <line class="conn" x1="546" y1="106" x2="590" y2="106" marker-end="url(#arr)"/>

  <!-- N5: OOD Dataset [accent] -->
  <rect class="na" x="590" y="84" width="140" height="44" rx="4"/>
  <text class="lbl" x="660" y="101" text-anchor="middle">OOD Dataset</text>
  <text class="sub" x="660" y="115" text-anchor="middle">query-ready</text>

</svg>
